  timezone: ^0.9.4
  table_calendar: ^3.1.2
  speech_to_text: ^7.0.0
  google_sign_in: ^6.2.1
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  google_fonts: ^6.2.1
  lottie: ^3.1.2

dev_dependencies:
